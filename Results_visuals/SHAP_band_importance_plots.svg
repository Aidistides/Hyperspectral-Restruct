<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>SHAP band-importance plots – SWIR dominance across all five soil targets</title>
<desc>SHAP feature importance bar charts for five soil targets: Nitrogen, SOC, PFAS, Heavy Metals, and Microplastics. SWIR bands (teal) account for over 85% of importance mass in every model.</desc>

<rect width="100%" height="100%" fill="#161b22" rx="8"/>

<!-- Title -->
<text x="340" y="24" text-anchor="middle" font-size="13" font-weight="500" font-family="system-ui,sans-serif" fill="#ffffff">SHAP band-importance plots — all five targets</text>
<text x="340" y="38" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="#aaaaaa">SWIR bands (&gt;1350 nm) account for &gt;85% of importance mass across all models</text>

<!-- Legend -->
<rect x="490" y="48" width="14" height="14" rx="2" fill="#1D9E75"/>
<text x="508" y="59" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">SWIR band (&gt;1350 nm)</text>
<rect x="490" y="68" width="14" height="14" rx="2" fill="#444441"/>
<text x="508" y="79" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">VIS/NIR band (&lt;1350 nm)</text>

<!-- ── ROW 1: Nitrogen + SOC ── -->

<!-- Nitrogen panel -->
<rect x="30" y="96" width="300" height="200" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
<text x="180" y="114" text-anchor="middle" font-size="12" font-weight="500" font-family="system-ui,sans-serif" fill="#ffffff">Nitrogen (N)</text>
<text x="180" y="126" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">R² 0.89 · RMSE 0.14% · SWIR 88%</text>

