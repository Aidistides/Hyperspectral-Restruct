<svg width="100%" viewBox="0 0 680 530" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Microplastics abundance map – drone HSI polymer C-H detection</title>
<desc>A spatial abundance map of microplastic particles (PE, PP, PET polymers) detected from drone hyperspectral imaging using C-H overtone bands at 1700–1750 nm and 2300–2350 nm. Classification accuracy 91%.</desc>

<rect width="100%" height="100%" fill="#161b22" rx="8"/>

<defs>
  <radialGradient id="mpHot" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#1D9E75" stop-opacity="0.88"/>
    <stop offset="50%"  stop-color="#5DCAA5" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#9FE1CB" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="mpWarm" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#5DCAA5" stop-opacity="0.72"/>
    <stop offset="70%"  stop-color="#9FE1CB" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#9FE1CB" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="mpBg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#0f1f18"/>
    <stop offset="100%" stop-color="#0a1510"/>
  </linearGradient>
  <linearGradient id="mpScale" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#0d2b1f"/>
    <stop offset="40%"  stop-color="#5DCAA5"/>
    <stop offset="75%"  stop-color="#1D9E75"/>
    <stop offset="100%" stop-color="#04342C"/>
  </linearGradient>
  <filter id="mp_blur"><feGaussianBlur stdDeviation="15"/></filter>
  <filter id="mp_blur2"><feGaussianBlur stdDeviation="8"/></filter>
  <clipPath id="mpClip"><rect x="40" y="40" width="420" height="310" rx="6"/></clipPath>
</defs>

<!-- Base field -->
<rect x="40" y="40" width="420" height="310" rx="6" fill="url(#mpBg)"/>

<!-- Background diffuse -->
<ellipse cx="240" cy="195" rx="200" ry="155" fill="#9FE1CB" opacity="0.15" filter="url(#mp_blur)" clip-path="url(#mpClip)"/>

<!-- Dense clusters -->
<ellipse cx="160" cy="160" rx="70" ry="52" fill="url(#mpHot)"  filter="url(#mp_blur2)" clip-path="url(#mpClip)"/>
<ellipse cx="310" cy="230" rx="80" ry="58" fill="url(#mpHot)"  filter="url(#mp_blur2)" clip-path="url(#mpClip)"/>
<ellipse cx="390" cy="120" rx="45" ry="35" fill="url(#mpWarm)" filter="url(#mp_blur2)" clip-path="url(#mpClip)"/>
<ellipse cx="90"  cy="250" rx="40" ry="32" fill="url(#mpWarm)" filter="url(#mp_blur2)" clip-path="url(#mpClip)"/>
<ellipse cx="230" cy="300" rx="50" ry="28" fill="url(#mpWarm)" filter="url(#mp_blur2)" clip-path="url(#mpClip)"/>

<!-- PE dots -->
<g fill="#0F6E56" opacity="0.8">
  <circle cx="140" cy="145" r="2.5"/>
  <circle cx="155" cy="160" r="3"/>
  <circle cx="170" cy="152" r="2"/>
  <circle cx="148" cy="175" r="2.5"/>
  <circle cx="163" cy="168" r="3.5"/>
  <circle cx="178" cy="160" r="2"/>
  <circle cx="135" cy="168" r="2"/>
  <circle cx="150" cy="180" r="2.5"/>
  <circle cx="290" cy="215" r="3"/>
  <circle cx="315" cy="225" r="2.5"/>
  <circle cx="328" cy="238" r="3.5"/>
  <circle cx="305" cy="245" r="2"/>
  <circle cx="320" cy="250" r="2.5"/>
  <circle cx="338" cy="222" r="2"/>
  <circle cx="300" cy="230" r="3"/>
  <circle cx="345" cy="240" r="2"/>
  <circle cx="380" cy="112" r="2.5"/>
  <circle cx="395" cy="124" r="2"/>
  <circle cx="88"  cy="245" r="2.5"/>
  <circle cx="98"  cy="258" r="2"/>
  <circle cx="226" cy="295" r="2.5"/>
  <circle cx="242" cy="305" r="2"/>
</g>

<!-- PP diamonds -->
<g fill="#1D9E75" opacity="0.75">
  <polygon points="158,142 162,146 158,150 154,146"/>
  <polygon points="175,168 179,172 175,176 171,172"/>
  <polygon points="145,185 149,189 145,193 141,189"/>
  <polygon points="322,210 326,214 322,218 318,214"/>
  <polygon points="298,248 302,252 298,256 294,252"/>
  <polygon points="342,232 346,236 342,240 338,236"/>
  <polygon points="393,108 397,112 393,116 389,112"/>
  <polygon points="86,262  90,266  86,270  82,266"/>
  <polygon points="234,308 238,312 234,316 230,312"/>
</g>

<!-- PET squares -->
<g fill="#085041" opacity="0.7">
  <rect x="166" y="148" width="5" height="5" rx="1"/>
  <rect x="141" y="158" width="4" height="4" rx="1"/>
  <rect x="173" y="176" width="5" height="5" rx="1"/>
  <rect x="303" y="218" width="5" height="5" rx="1"/>
  <rect x="326" y="244" width="4" height="4" rx="1"/>
  <rect x="335" y="215" width="5" height="5" rx="1"/>
  <rect x="385" y="126" width="4" height="4" rx="1"/>
  <rect x="93"  y="250" width="4" height="4" rx="1"/>
  <rect x="220" y="298" width="4" height="4" rx="1"/>
</g>

<!-- Contour rings – cluster A -->
<ellipse cx="160" cy="160" rx="88"  ry="66"  fill="none" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="4 3" opacity="0.65" clip-path="url(#mpClip)"/>
<ellipse cx="160" cy="160" rx="120" ry="90"  fill="none" stroke="#5DCAA5" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.4"  clip-path="url(#mpClip)"/>

<!-- Contour rings – cluster B -->
<ellipse cx="310" cy="230" rx="100" ry="75"  fill="none" stroke="#1D9E75" stroke-width="0.6" stroke-dasharray="4 3" opacity="0.6"  clip-path="url(#mpClip)"/>

<!-- Center markers -->
<circle cx="160" cy="160" r="4" fill="#04342C" stroke="#fff" stroke-width="1"/>
<circle cx="310" cy="230" r="4" fill="#04342C" stroke="#fff" stroke-width="1"/>
<circle cx="390" cy="120" r="3" fill="#0F6E56" stroke="#fff" stroke-width="0.8"/>

<!-- Map border -->
<rect x="40" y="40" width="420" height="310" rx="6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>

<!-- Title -->
<text x="250" y="20" text-anchor="middle" font-size="13" font-weight="500" font-family="system-ui,sans-serif" fill="#ffffff">Microplastics abundance map — polymer C-H signatures</text>
<text x="250" y="34" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="#aaaaaa">Bands: 1700–1750 nm + 2300–2350 nm · Acc. 91% · Distinct from PFAS (C-F)</text>

<!-- Legend panel -->
<rect x="476" y="40" width="188" height="230" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text x="570" y="60" text-anchor="middle" font-size="12" font-weight="500" font-family="system-ui,sans-serif" fill="#ffffff">Polymer types detected</text>

<circle cx="492" cy="82"  r="5" fill="#0F6E56" opacity="0.9"/>
<text x="504" y="86"  font-size="11" font-family="system-ui,sans-serif" fill="#ffffff">PE (polyethylene)</text>
<text x="504" y="97"  font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Round particle signature</text>

<polygon points="490,112 494,116 490,120 486,116" fill="#1D9E75" opacity="0.9"/>
<text x="504" y="120" font-size="11" font-family="system-ui,sans-serif" fill="#ffffff">PP (polypropylene)</text>
<text x="504" y="131" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Angular fragments</text>

<rect x="488" y="148" width="8" height="8" rx="1" fill="#085041" opacity="0.9"/>
<text x="504" y="157" font-size="11" font-family="system-ui,sans-serif" fill="#ffffff">PET (polyester)</text>
<text x="504" y="168" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Fiber / film particles</text>

<line x1="484" y1="180" x2="654" y2="180" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>

<text x="570" y="196" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Particle density (particles/m²)</text>
<rect x="490" y="202" width="148" height="10" rx="2" fill="url(#mpScale)"/>
<text x="490" y="225" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Low</text>
<text x="638" y="225" text-anchor="end" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">High</text>
<text x="570" y="237" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">1700–1750 nm C-H band</text>
<text x="570" y="249" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Model acc: 91%</text>
<text x="570" y="261" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Inference: 52 ms/cube</text>

<!-- Callouts -->
<line x1="160" y1="160" x2="476" y2="290" stroke="#04342C" stroke-width="0.7" stroke-dasharray="3 3"/>
<text x="480" y="287" font-size="11" font-weight="500" font-family="system-ui,sans-serif" fill="#1D9E75">Cluster A</text>
<text x="480" y="299" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">~840 particles/m²</text>
<text x="480" y="310" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">PE + PP dominant</text>

<line x1="310" y1="230" x2="476" y2="330" stroke="#1D9E75" stroke-width="0.7" stroke-dasharray="3 3"/>
<text x="480" y="327" font-size="11" font-weight="500" font-family="system-ui,sans-serif" fill="#1D9E75">Cluster B</text>
<text x="480" y="339" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">~620 particles/m²</text>
<text x="480" y="350" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">All 3 polymers</text>

<!-- Scale bar -->
<rect x="40" y="368" width="300" height="12" rx="3" fill="url(#mpScale)"/>
<text x="40"  y="394" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">0</text>
<text x="190" y="394" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">500</text>
<text x="340" y="394" text-anchor="end" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">1000+ particles/m²</text>

<!-- Stats row -->
<rect x="40" y="408" width="420" height="62" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text x="55" y="426" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Model: 3D CNN + SPA · Classification acc: 91% · 12 SWIR-dominant bands</text>
<text x="55" y="441" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Key bands: 1714, 1737 nm (C-H) · 2318, 2340 nm (polymer overtones)</text>
<text x="55" y="456" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Validation: FTIR on field samples · NOT PFAS — distinct spectral model</text>

<text x="40" y="480" font-size="10" font-family="system-ui,sans-serif" fill="#555555">Source: Icarus HSI · Enotrium field trials · microplastics ≠ PFAS — separate spectral signatures</text>

</svg>
