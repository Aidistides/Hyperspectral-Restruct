<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>PFAS hotspot heatmap – anonymized field data</title>
<desc>An anonymized geospatial heatmap showing PFAS contamination hotspots detected via hyperspectral C-F stretch absorption at 1350–1450 nm and 1700–1800 nm. R² 0.88, RMSE 0.11 µg/kg.</desc>

<rect width="100%" height="100%" fill="#161b22" rx="8"/>

<defs>
  <radialGradient id="hot1" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#E24B4A" stop-opacity="0.92"/>
    <stop offset="40%"  stop-color="#BA7517" stop-opacity="0.65"/>
    <stop offset="80%"  stop-color="#EF9F27" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#EF9F27" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="hot2" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#E24B4A" stop-opacity="0.82"/>
    <stop offset="50%"  stop-color="#BA7517" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#EF9F27" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="warm1" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#EF9F27" stop-opacity="0.7"/>
    <stop offset="60%"  stop-color="#FAC775" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#FAC775" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="bgField" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#1a2a3a"/>
    <stop offset="100%" stop-color="#0d1f30"/>
  </linearGradient>
  <linearGradient id="scalebar" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#185FA5"/>
    <stop offset="25%"  stop-color="#3B8BD4"/>
    <stop offset="55%"  stop-color="#EF9F27"/>
    <stop offset="78%"  stop-color="#E24B4A"/>
    <stop offset="100%" stop-color="#791F1F"/>
  </linearGradient>
  <filter id="gblur"><feGaussianBlur stdDeviation="18"/></filter>
  <filter id="gblur3"><feGaussianBlur stdDeviation="12"/></filter>
  <clipPath id="mapClip"><rect x="40" y="40" width="440" height="320" rx="6"/></clipPath>
</defs>

<!-- Base field -->
<rect x="40" y="40" width="440" height="320" rx="6" fill="url(#bgField)"/>

<!-- Background diffuse PFAS -->
<ellipse cx="230" cy="200" rx="210" ry="160" fill="#3B8BD4" opacity="0.15" filter="url(#gblur)" clip-path="url(#mapClip)"/>

<!-- Warm zones -->
<ellipse cx="170" cy="220" rx="70" ry="50" fill="url(#warm1)" filter="url(#gblur)"  clip-path="url(#mapClip)"/>
<ellipse cx="350" cy="140" rx="55" ry="42" fill="url(#warm1)" filter="url(#gblur)"  clip-path="url(#mapClip)"/>
<ellipse cx="400" cy="280" rx="45" ry="38" fill="url(#warm1)" filter="url(#gblur3)" clip-path="url(#mapClip)"/>

<!-- Hotspots -->
<ellipse cx="200" cy="190" rx="55" ry="42" fill="url(#hot1)" filter="url(#gblur3)" clip-path="url(#mapClip)"/>
<ellipse cx="340" cy="250" rx="42" ry="35" fill="url(#hot2)" filter="url(#gblur3)" clip-path="url(#mapClip)"/>
<ellipse cx="110" cy="150" rx="28" ry="22" fill="url(#hot2)" filter="url(#gblur3)" clip-path="url(#mapClip)"/>

<!-- Contour rings – hotspot A -->
<ellipse cx="200" cy="190" rx="70"  ry="55"  fill="none" stroke="#E24B4A" stroke-width="0.7" stroke-dasharray="4 3" opacity="0.7" clip-path="url(#mapClip)"/>
<ellipse cx="200" cy="190" rx="95"  ry="75"  fill="none" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.5" clip-path="url(#mapClip)"/>
<ellipse cx="200" cy="190" rx="125" ry="100" fill="none" stroke="#EF9F27" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.3" clip-path="url(#mapClip)"/>

<!-- Contour rings – hotspot B -->
<ellipse cx="340" cy="250" rx="58" ry="48" fill="none" stroke="#E24B4A" stroke-width="0.7" stroke-dasharray="4 3" opacity="0.65" clip-path="url(#mapClip)"/>
<ellipse cx="340" cy="250" rx="82" ry="68" fill="none" stroke="#BA7517" stroke-width="0.5" stroke-dasharray="4 3" opacity="0.4"  clip-path="url(#mapClip)"/>

<!-- Survey grid -->
<g stroke="#ffffff" stroke-width="0.3" opacity="0.1">
  <line x1="40"  y1="80"  x2="480" y2="80"/>
  <line x1="40"  y1="120" x2="480" y2="120"/>
  <line x1="40"  y1="160" x2="480" y2="160"/>
  <line x1="40"  y1="200" x2="480" y2="200"/>
  <line x1="40"  y1="240" x2="480" y2="240"/>
  <line x1="40"  y1="280" x2="480" y2="280"/>
  <line x1="40"  y1="320" x2="480" y2="320"/>
  <line x1="80"  y1="40"  x2="80"  y2="360"/>
  <line x1="140" y1="40"  x2="140" y2="360"/>
  <line x1="200" y1="40"  x2="200" y2="360"/>
  <line x1="260" y1="40"  x2="260" y2="360"/>
  <line x1="320" y1="40"  x2="320" y2="360"/>
  <line x1="380" y1="40"  x2="380" y2="360"/>
  <line x1="440" y1="40"  x2="440" y2="360"/>
</g>

<!-- Hotspot markers -->
<circle cx="200" cy="190" r="4" fill="#791F1F" stroke="#fff" stroke-width="1"/>
<circle cx="340" cy="250" r="4" fill="#A32D2D" stroke="#fff" stroke-width="1"/>
<circle cx="110" cy="150" r="3" fill="#A32D2D" stroke="#fff" stroke-width="0.8"/>

<!-- Map border -->
<rect x="40" y="40" width="440" height="320" rx="6" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.7"/>

<!-- Anonymization badge -->
<rect x="42" y="42" width="155" height="18" rx="3" fill="rgba(0,0,0,0.5)"/>
<text x="50" y="55" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">⬛ Coordinates anonymized</text>

<!-- Title -->
<text x="260" y="20" text-anchor="middle" font-size="13" font-weight="500" font-family="system-ui,sans-serif" fill="#ffffff">PFAS hotspot heatmap — drone HSI survey</text>
<text x="260" y="34" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="#aaaaaa">C-F stretch bands: 1350–1450 nm + 1700–1800 nm · R² 0.88 · RMSE 0.11 µg/kg</text>

<!-- Callout A -->
<line x1="200" y1="190" x2="500" y2="148" stroke="#E24B4A" stroke-width="0.7" stroke-dasharray="3 3"/>
<circle cx="500" cy="148" r="2" fill="#E24B4A"/>
<text x="504" y="145" font-size="11" font-weight="500" font-family="system-ui,sans-serif" fill="#E24B4A">Hotspot A</text>
<text x="504" y="157" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">18.4 µg/kg est.</text>
<text x="504" y="168" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Exceeds EPA advisory</text>

<!-- Callout B -->
<line x1="340" y1="250" x2="500" y2="220" stroke="#BA7517" stroke-width="0.7" stroke-dasharray="3 3"/>
<circle cx="500" cy="220" r="2" fill="#BA7517"/>
<text x="504" y="217" font-size="11" font-weight="500" font-family="system-ui,sans-serif" fill="#EF9F27">Hotspot B</text>
<text x="504" y="229" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">7.2 µg/kg est.</text>
<text x="504" y="240" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Elevated zone</text>

<!-- Callout warm -->
<line x1="110" y1="150" x2="500" y2="290" stroke="#EF9F27" stroke-width="0.6" stroke-dasharray="3 3"/>
<circle cx="500" cy="290" r="2" fill="#EF9F27"/>
<text x="504" y="287" font-size="11" font-weight="500" font-family="system-ui,sans-serif" fill="#EF9F27">Warm zone</text>
<text x="504" y="299" font-size="10" font-family="system-ui,sans-serif" fill="#cccccc">1.8 µg/kg est.</text>
<text x="504" y="310" font-size="10" font-family="system-ui,sans-serif" fill="#aaaaaa">Background +</text>

<!-- Color scale bar -->
<rect x="40" y="378" width="300" height="14" rx="3" fill="url(#scalebar)"/>
<line x1="40"  y1="378" x2="40"  y2="392" stroke="#aaaaaa" stroke-width="0.6"/>
<line x1="115" y1="378" x2="115" y2="392" stroke="#aaaaaa" stroke-width="0.6"/>
<line x1="190" y1="378" x2="190" y2="392" stroke="#aaaaaa" stroke-width="0.6"/>
<line x1="265" y1="378" x2="265" y2="392" stroke="#aaaaaa" stroke-width="0.6"/>
<line x1="340" y1="378" x2="340" y2="392" stroke="#aaaaaa" stroke-width="0.6"/>
<text x="40"  y="405" font-size="10" text-anchor="middle" font-family="system-ui,sans-serif" fill="#aaaaaa">0</text>
<text x="115" y="405" font-size="10" text-anchor="middle" font-family="system-ui,sans-serif" fill="#aaaaaa">1</text>
<text x="190" y="405" font-size="10" text-anchor="middle" font-family="system-ui,sans-serif" fill="#aaaaaa">5</text>
<text x="265" y="405" font-size="10" text-anchor="middle" font-family="system-ui,sans-serif" fill="#aaaaaa">10</text>
<text x="340" y="405" font-size="10" text-anchor="middle" font-family="system-ui,sans-serif" fill="#aaaaaa">20 µg/kg</text>
<text x="170" y="418" text-anchor="middle" font-size="11" font-family="system-ui,sans-serif" fill="#aaaaaa">PFAS concentration (estimated)</text>

<!-- Stats row -->
<rect x="40" y="430" width="440" height="60" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="0.5"/>
<text x="55" y="448" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Model: 3D CNN + SPA · 12 SWIR bands</text>
<text x="55" y="463" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Key bands: 1392, 1420, 1748, 1795 nm (C-F stretch)</text>
<text x="55" y="478" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Inference: 45 ms/cube · Jetson Orin Nano</text>
<text x="305" y="448" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">R² = 0.88 · RMSE = 0.11 µg/kg</text>
<text x="305" y="463" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Validation: GC-MS field samples</text>
<text x="305" y="478" font-size="11" font-family="system-ui,sans-serif" fill="#cccccc">Contaminant: PFAS (not microplastics)</text>

<text x="40" y="503" font-size="10" font-family="system-ui,sans-serif" fill="#555555">⚠ Anonymized site · coordinate grid suppressed · research use only</text>

</svg>
